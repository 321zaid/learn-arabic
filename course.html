<!DOCTYPE html>
<html lang="en"> 
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fahm Arabic — 10-Day Quranic Vocabulary Blueprint</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --em-dark:#083D2E;--em:#0D5C46;--em-light:#1A7A5E;--em-faint:#E8F5F0;
  --gold:#C9A84C;--gold-light:#E8C97A;--gold-faint:#FFF8E7;
  --cream:#F8F6F1;--cream-dark:#F0EBE0;
  --text:#1A1A1A;--text-mid:#4A4A4A;--text-light:#6B6B6B;
  --white:#FFFFFF;--border:#E2DDD5;--red:#FF6B6B;
}
html{scroll-behavior:smooth;}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--cream);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
.font-arabic{font-family:'Amiri',serif;direction:rtl;}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(201,168,76,0.35);}50%{box-shadow:0 0 0 10px rgba(201,168,76,0);}}
@keyframes ripple{0%{transform:scale(0);opacity:0.5;}100%{transform:scale(3);opacity:0;}}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
@keyframes glow{0%,100%{text-shadow:0 0 6px rgba(201,168,76,0.2);}50%{text-shadow:0 0 18px rgba(201,168,76,0.6);}}
@keyframes waveBar{0%,100%{height:4px;}50%{height:18px;}}
@keyframes checkBounce{0%{transform:scale(0) rotate(-10deg);}70%{transform:scale(1.15) rotate(3deg);}100%{transform:scale(1) rotate(0);}};
@keyframes shimmer{0%{background-position:-400px 0;}100%{background-position:400px 0;}}
@keyframes slideRight{from{transform:translateX(-8px);opacity:0;}to{transform:translateX(0);opacity:1;}}
@keyframes scaleIn{from{transform:scale(0.92);opacity:0;}to{transform:scale(1);opacity:1;}}

/* ── GATE ── */
#gate{position:fixed;inset:0;z-index:200;background:var(--em-dark);display:flex;align-items:center;justify-content:center;padding:1.5rem;transition:opacity 0.5s ease;}
.gate-rings{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.gate-rings::before,.gate-rings::after{content:'';position:absolute;border-radius:50%;border:1px solid rgba(201,168,76,0.1);}
.gate-rings::before{width:500px;height:500px;top:50%;left:50%;transform:translate(-50%,-50%);}
.gate-rings::after{width:750px;height:750px;top:50%;left:50%;transform:translate(-50%,-50%);}
.gate-box{position:relative;z-index:1;width:100%;max-width:400px;text-align:center;animation:fadeUp 0.6s ease;}
.gate-logo{font-size:42px;font-weight:800;color:var(--white);letter-spacing:-1px;margin-bottom:4px;}
.gate-logo span{color:var(--gold);}
.gate-sub{font-size:13px;color:rgba(255,255,255,0.45);letter-spacing:0.06em;margin-bottom:36px;}
.gate-card{background:rgba(255,255,255,0.06);border:1px solid rgba(201,168,76,0.2);border-radius:16px;padding:28px;backdrop-filter:blur(12px);}
.gate-label{display:block;text-align:left;font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-bottom:10px;}
.gate-input{width:100%;padding:13px 15px;border-radius:10px;border:1px solid rgba(201,168,76,0.25);background:rgba(255,255,255,0.06);color:var(--white);font-size:16px;letter-spacing:0.12em;outline:none;transition:border-color 0.2s,box-shadow 0.2s;margin-bottom:14px;font-family:inherit;}
.gate-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,0.12);}
.gate-input::placeholder{color:rgba(255,255,255,0.2);letter-spacing:normal;}
.gate-btn{width:100%;padding:14px;border-radius:10px;border:none;background:var(--gold);color:var(--em-dark);font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;font-family:inherit;}
.gate-btn:hover{background:var(--gold-light);transform:translateY(-1px);box-shadow:0 6px 20px rgba(201,168,76,0.3);}
.gate-err{min-height:18px;font-size:12px;color:#ff9090;margin-top:10px;animation:fadeIn 0.25s ease;}
.gate-hint{font-size:12px;color:rgba(255,255,255,0.28);margin-top:18px;line-height:1.7;}

/* ── COURSE SHELL ── */
#course{display:none;min-height:100vh;}

/* ── HEADER ── */
.hdr{background:var(--em-dark);border-bottom:2px solid var(--gold);position:sticky;top:0;z-index:100;}
.hdr-inner{max-width:800px;margin:0 auto;padding:0 20px;height:58px;display:flex;align-items:center;justify-content:space-between;}
.hdr-brand{display:flex;align-items:center;gap:10px;}
.hdr-logo{width:34px;height:34px;background:var(--gold);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:var(--em-dark);animation:float 3s ease-in-out infinite;flex-shrink:0;}
.hdr-title{font-size:15px;font-weight:700;color:var(--white);}
.hdr-sub{font-size:11px;color:rgba(255,255,255,0.38);}
.prog-pill{background:rgba(201,168,76,0.14);border:1px solid rgba(201,168,76,0.35);color:var(--gold-light);font-size:12px;font-weight:600;padding:5px 13px;border-radius:20px;transition:all 0.3s;white-space:nowrap;}

/* ── PROGRESS BAR ── */
.prog-bar-wrap{background:var(--em-dark);padding:0 20px 12px;}
.prog-bar-inner{max-width:800px;margin:0 auto;display:flex;align-items:center;gap:10px;}
.prog-track{flex:1;height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--em-light),var(--gold));border-radius:2px;width:0%;transition:width 0.7s cubic-bezier(0.4,0,0.2,1);}
.prog-label{font-size:11px;color:rgba(255,255,255,0.35);white-space:nowrap;}

/* ── MAIN ── */
.main{max-width:800px;margin:0 auto;padding:22px 16px 80px;}

/* ── DAY GRID ── */
.day-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-bottom:24px;}
.day-btn{border:1.5px solid var(--border);background:var(--white);border-radius:10px;padding:11px 5px;cursor:pointer;text-align:center;position:relative;overflow:hidden;user-select:none;transition:border-color 0.2s,transform 0.2s,box-shadow 0.2s;}
.day-btn:not(.locked):not(.active):hover{border-color:var(--em-light);transform:translateY(-2px);box-shadow:0 4px 14px rgba(13,92,70,0.1);}
.day-btn.active{border-color:var(--em);background:var(--em-faint);box-shadow:0 0 0 3px rgba(13,92,70,0.12);transform:translateY(-2px);}
.day-btn.done{border-color:var(--gold);background:var(--gold-faint);}
.day-btn.locked{opacity:0.38;cursor:not-allowed;}
.day-num{font-size:10px;font-weight:700;color:var(--text-light);letter-spacing:0.05em;}
.day-root{font-size:12px;font-weight:700;color:var(--text);margin-top:3px;}
.day-badge{position:absolute;top:4px;right:4px;width:15px;height:15px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;}
.day-badge.ck{background:var(--gold);color:var(--em-dark);}
.day-badge.lk{color:var(--text-light);font-size:8px;}

/* ── LESSON CARD ── */
.lesson-card{background:var(--white);border-radius:16px;border:1px solid var(--border);overflow:hidden;animation:scaleIn 0.35s ease;}

/* header band */
.lhdr{background:var(--em-dark);padding:26px 26px 22px;position:relative;overflow:hidden;}
.lhdr::before{content:'';position:absolute;right:-30px;top:-30px;width:180px;height:180px;border-radius:50%;border:1px solid rgba(201,168,76,0.08);}
.lhdr::after{content:'';position:absolute;left:-20px;bottom:-40px;width:140px;height:140px;border-radius:50%;border:1px solid rgba(201,168,76,0.06);}
.lhdr-badge{display:inline-block;background:rgba(201,168,76,0.18);border:1px solid rgba(201,168,76,0.35);color:var(--gold-light);font-size:11px;font-weight:700;letter-spacing:0.08em;padding:4px 12px;border-radius:20px;margin-bottom:10px;text-transform:uppercase;}
.lhdr-title{font-size:24px;font-weight:800;color:var(--white);line-height:1.2;margin-bottom:5px;}
.lhdr-mission{font-size:13px;color:rgba(255,255,255,0.55);line-height:1.6;margin-bottom:14px;}
.lhdr-arabic{font-size:22px;color:var(--gold);font-weight:700;font-family:'Amiri',serif;animation:glow 3s ease-in-out infinite;line-height:1.6;}

/* body */
.lbody{padding:24px;}

/* section label */
.sec{font-size:10px;font-weight:800;letter-spacing:0.14em;text-transform:uppercase;color:var(--gold);margin:24px 0 10px;display:flex;align-items:center;gap:8px;}
.sec:first-child{margin-top:0;}
.sec::after{content:'';flex:1;height:1px;background:var(--cream-dark);}

/* ── AUDIO PLAYER ── */
.audio-wrap{background:var(--em-dark);border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:opacity 0.2s;user-select:none;}
.audio-wrap:hover{opacity:0.9;}
.play-btn{width:42px;height:42px;border-radius:50%;background:var(--gold);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform 0.2s,background 0.2s;position:relative;overflow:hidden;}
.play-btn:hover{background:var(--gold-light);transform:scale(1.07);}
.play-btn svg{width:16px;height:16px;fill:var(--em-dark);}
.audio-info{flex:1;min-width:0;}
.audio-title{font-size:13px;font-weight:600;color:var(--white);margin-bottom:3px;}
.audio-sub{font-size:11px;color:rgba(255,255,255,0.35);font-style:italic;}
.audio-progress-track{height:3px;background:rgba(255,255,255,0.12);border-radius:2px;margin-top:7px;cursor:pointer;overflow:hidden;}
.audio-progress-fill{height:100%;background:var(--gold);border-radius:2px;width:0%;transition:width 0.1s linear;}
.wave-wrap{display:flex;align-items:center;gap:3px;flex-shrink:0;}
.wbar{width:3px;background:rgba(255,255,255,0.2);border-radius:2px;height:4px;transition:background 0.2s;}
.audio-wrap.playing .wbar{background:var(--gold-light);}
.audio-wrap.playing .wbar:nth-child(1){animation:waveBar 0.7s ease infinite 0s;}
.audio-wrap.playing .wbar:nth-child(2){animation:waveBar 0.7s ease infinite 0.12s;}
.audio-wrap.playing .wbar:nth-child(3){animation:waveBar 0.7s ease infinite 0.24s;}
.audio-wrap.playing .wbar:nth-child(4){animation:waveBar 0.7s ease infinite 0.06s;}
.audio-wrap.playing .wbar:nth-child(5){animation:waveBar 0.7s ease infinite 0.18s;}
.audio-wrap.playing .wbar:nth-child(6){animation:waveBar 0.7s ease infinite 0.3s;}
.audio-wrap.playing .wbar:nth-child(7){animation:waveBar 0.7s ease infinite 0.09s;}

/* ── FLIP CARDS ── */
.flip-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;}
.flip-card{height:105px;cursor:pointer;perspective:900px;user-select:none;}
.flip-inner{position:relative;width:100%;height:100%;transition:transform 0.5s cubic-bezier(0.4,0,0.2,1);transform-style:preserve-3d;}
.flip-card.flipped .flip-inner{transform:rotateY(180deg);}
.flip-front,.flip-back{position:absolute;inset:0;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px;text-align:center;backface-visibility:hidden;border:1.5px solid var(--border);}
.flip-front{background:var(--cream);}
.flip-back{background:var(--em-dark);transform:rotateY(180deg);border-color:var(--em);}
.fa{font-size:20px;color:var(--em-dark);font-weight:700;margin-bottom:5px;font-family:'Amiri',serif;line-height:1.3;}
.fl{font-size:10px;font-weight:800;color:var(--gold);letter-spacing:0.06em;margin-bottom:3px;}
.fhint{font-size:10px;color:var(--text-light);}
.fm{font-size:12px;color:var(--white);font-weight:600;line-height:1.4;}
.ft{font-size:10px;color:rgba(255,255,255,0.45);margin-top:4px;}
.fshift{font-size:10px;color:rgba(255,255,255,0.3);margin-top:3px;line-height:1.3;}

/* ── CONCEPT BOX ── */
.concept{background:var(--em-faint);border-left:4px solid var(--gold);border-radius:0 10px 10px 0;padding:16px 18px;}
.concept p{font-size:14px;line-height:1.8;color:var(--text-mid);}

/* ── DECODE WIN ── */
.decode{background:var(--gold-faint);border:1.5px solid rgba(201,168,76,0.35);border-radius:10px;padding:16px 18px;position:relative;overflow:hidden;}
.decode::before{content:'⚡';position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:36px;opacity:0.07;}
.decode-label{font-size:10px;font-weight:800;letter-spacing:0.1em;color:var(--gold);text-transform:uppercase;margin-bottom:8px;}
.decode-arabic{display:block;font-size:18px;color:var(--em-dark);font-weight:700;font-family:'Amiri',serif;text-align:center;background:rgba(13,92,70,0.06);border-radius:8px;padding:10px;margin-bottom:10px;line-height:1.6;}
.decode-trans{font-size:12px;color:var(--text-light);text-align:center;margin-bottom:10px;font-style:italic;}
.decode p{font-size:13px;line-height:1.7;color:var(--text-mid);}

/* ── PRAYER ROWS ── */
.prayer-rows{display:flex;flex-direction:column;gap:7px;}
.prayer-row{display:flex;gap:10px;align-items:flex-start;background:var(--cream);border:1px solid var(--border);border-radius:10px;padding:12px;transition:border-color 0.2s,background 0.2s;}
.prayer-row:hover{border-color:var(--em-light);background:var(--em-faint);}
.ptag{background:var(--em-dark);color:rgba(255,255,255,0.85);font-size:11px;font-weight:700;padding:3px 9px;border-radius:4px;white-space:nowrap;flex-shrink:0;margin-top:2px;letter-spacing:0.02em;}
.ptext{font-size:13px;line-height:1.6;color:var(--text);}

/* ── PRACTICE ── */
.practice{background:var(--em-dark);border-radius:10px;padding:18px 20px;display:flex;gap:14px;align-items:flex-start;}
.picon{font-size:20px;flex-shrink:0;margin-top:1px;}
.practice p{font-size:14px;line-height:1.75;color:rgba(255,255,255,0.88);}

/* ── REFLECTION ── */
.reflection{border:1.5px solid var(--border);border-radius:10px;padding:18px;}
.rq{font-size:14px;font-weight:600;color:var(--em-dark);line-height:1.65;margin-bottom:12px;font-style:italic;}
.rinput{width:100%;border:1px solid var(--border);border-radius:8px;padding:11px 13px;font-size:14px;line-height:1.6;color:var(--text);background:var(--cream);resize:none;min-height:80px;font-family:inherit;transition:border-color 0.2s,box-shadow 0.2s;outline:none;}
.rinput:focus{border-color:var(--em-light);box-shadow:0 0 0 3px rgba(13,92,70,0.07);}
.rsave{font-size:11px;color:var(--text-light);margin-top:6px;min-height:16px;transition:all 0.3s;}
.rsave.ok{color:var(--em-light);}

/* ── COMPLETE BTN ── */
.action-row{margin-top:24px;padding-top:20px;border-top:1px solid var(--cream-dark);}
.cbtn{width:100%;padding:15px;border-radius:10px;background:var(--em-dark);color:var(--gold-light);border:none;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;transition:all 0.2s;position:relative;overflow:hidden;animation:pulse 2.5s ease-in-out infinite;font-family:inherit;}
.cbtn:hover:not(:disabled){background:var(--em);transform:translateY(-2px);box-shadow:0 8px 24px rgba(13,92,70,0.28);animation:none;}
.cbtn:disabled{opacity:0.5;cursor:not-allowed;animation:none;}
.ripple-el{position:absolute;border-radius:50%;background:rgba(255,255,255,0.18);animation:ripple 0.6s ease forwards;pointer-events:none;}

/* ── DONE BANNER ── */
.done-banner{background:var(--em-faint);border:1.5px solid var(--em-light);border-radius:10px;padding:11px 15px;display:flex;align-items:center;gap:9px;margin-bottom:18px;animation:fadeIn 0.3s ease;}
.done-icon{font-size:17px;animation:checkBounce 0.4s ease;}
.done-txt{font-size:13px;color:var(--em-dark);font-weight:600;}

/* ── LOCKED ── */
.locked-scr{padding:56px 20px;text-align:center;animation:fadeIn 0.3s ease;}
.locked-icon{font-size:44px;opacity:0.35;margin-bottom:14px;}
.locked-title{font-size:17px;font-weight:700;color:var(--text);margin-bottom:7px;}
.locked-sub{font-size:14px;color:var(--text-light);line-height:1.6;}

/* ── COMPLETION ── */
.completion{background:var(--white);border-radius:16px;border:1px solid var(--border);overflow:hidden;animation:fadeUp 0.5s ease;}
.comp-hdr{background:var(--em-dark);padding:44px 28px;text-align:center;position:relative;overflow:hidden;}
.comp-hdr::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 60%,rgba(201,168,76,0.07),transparent 65%);}
.comp-ameen{display:block;font-size:44px;font-weight:800;color:var(--gold);margin-bottom:10px;animation:glow 2.5s ease-in-out infinite;font-family:'Amiri',serif;}
.comp-title{font-size:20px;font-weight:700;color:var(--white);margin-bottom:8px;}
.comp-sub{font-size:14px;color:rgba(255,255,255,0.55);line-height:1.7;}
.comp-body{padding:28px;}
.comp-verse{background:var(--em-faint);border-left:4px solid var(--gold);border-radius:0 10px 10px 0;padding:18px;margin-bottom:22px;text-align:center;}
.comp-arabic{font-size:18px;color:var(--em-dark);font-weight:700;font-family:'Amiri',serif;margin-bottom:7px;line-height:1.7;}
.comp-trans{font-size:12px;color:var(--text-light);font-style:italic;}
.comp-roots{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-bottom:22px;}
.comp-root{background:var(--cream);border:1px solid var(--border);border-radius:8px;padding:9px 5px;text-align:center;}
.cr-day{font-size:9px;color:var(--text-light);font-weight:700;letter-spacing:0.05em;}
.cr-root{font-size:11px;font-weight:800;color:var(--gold);margin-top:2px;}
.comp-msg{font-size:15px;line-height:1.8;color:var(--text-mid);text-align:center;}

/* ── RESPONSIVE ── */
@media(max-width:480px){
  .lhdr-title{font-size:20px;}
  .lhdr-arabic{font-size:18px;}
  .lbody{padding:18px 14px;}
  .lhdr{padding:20px 18px 18px;}
  .flip-grid{grid-template-columns:repeat(2,1fr);}
  .comp-roots{grid-template-columns:repeat(5,1fr);}
}
</style>
</head>
<body>

<!-- GATE -->
<div id="gate">
  <div class="gate-rings"></div>
  <div class="gate-box">
    <div class="gate-logo">fahm<span>.</span></div>
    <div class="gate-sub">10-Day Quranic Vocabulary Blueprint</div>
    <div class="gate-card">
      <label class="gate-label">Access Password</label>
      <input class="gate-input" id="pw" type="password" placeholder="Enter your password" autocomplete="off">
      <button class="gate-btn" onclick="tryPw()">Enter Course →</button>
      <div class="gate-err" id="pw-err"></div>
    </div>
    <div class="gate-hint">Purchased but lost your password?<br>Email <strong style="color:rgba(255,255,255,0.45)">support@fahmarabic.com</strong></div>
  </div>
</div>

<!-- COURSE -->
<div id="course">
  <div class="hdr">
    <div class="hdr-inner">
      <div class="hdr-brand">
        <div class="hdr-logo">F</div>
        <div>
          <div class="hdr-title">Fahm Arabic</div>
          <div class="hdr-sub">10-Day Blueprint</div>
        </div>
      </div>
      <div class="prog-pill" id="prog-pill">Day 1 of 10</div>
    </div>
  </div>
  <div class="prog-bar-wrap">
    <div class="prog-bar-inner">
      <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
      <div class="prog-label" id="prog-label">0 / 10</div>
    </div>
  </div>
  <div class="main">
    <div class="day-grid" id="day-grid"></div>
    <div id="lesson-area"></div>
  </div>
</div>

<script>
// ── PASSWORD ──────────────────────────────────────────────────────────
const PW = 'Quran@root7';
function tryPw(){
  const v = document.getElementById('pw').value.trim();
  const err = document.getElementById('pw-err');
  if(v === PW){
    localStorage.setItem('fahm_auth','true');
    const g = document.getElementById('gate');
    g.style.opacity = '0';
    setTimeout(()=>{ g.style.display='none'; document.getElementById('course').style.display='block'; initCourse(); }, 500);
  } else {
    err.textContent = 'Incorrect password. Check your Gumroad confirmation email.';
    setTimeout(()=>{ err.textContent=''; }, 3000);
  }
}
document.addEventListener('keydown', e=>{ if(e.key==='Enter') tryPw(); });

// ── COURSE DATA ───────────────────────────────────────────────────────
const DAYS = [
  { root:'S-L-M', title:'The Foundation of Peace', arabic:'أَسْلَمَ · إِسْلَام · مُسْلِم · سَلَام',

let state = { cur:0, done:new Set(), ref:{} };
function save(){ localStorage.setItem('fahm_done',JSON.stringify([...state.done])); localStorage.setItem('fahm_cur',state.cur); localStorage.setItem('fahm_ref',JSON.stringify(state.ref)); }
function load(){ try{ const d=localStorage.getItem('fahm_done'); if(d) state.done=new Set(JSON.parse(d)); const c=localStorage.getItem('fahm_cur'); if(c!==null) state.cur=parseInt(c); const r=localStorage.getItem('fahm_ref'); if(r) state.ref=JSON.parse(r); }catch(e){} }
function unlocked(){ return state.done.size===0?1:Math.min(state.done.size+1,10); }

// ── AUDIO ─────────────────────────────────────────────────────────────
let activeAudio=null, activeWrap=null;
function toggleAudio(dayIdx, src){
  const wrap = document.getElementById('aw-'+dayIdx);
  if(!wrap) return;
  const playing = wrap.classList.contains('playing');
  // stop any active
  if(activeAudio){ activeAudio.pause(); activeAudio.currentTime=0; }
  if(activeWrap){ activeWrap.classList.remove('playing'); setPlayIcon(activeWrap, false); }
  if(playing){ activeAudio=null; activeWrap=null; return; }
  if(!src){ return; } // no audio file yet
  const audio = new Audio(src);
  activeAudio=audio; activeWrap=wrap;
  wrap.classList.add('playing');
  setPlayIcon(wrap,true);
  audio.play().catch(()=>{});
  audio.addEventListener('timeupdate',()=>{
    const fill=wrap.querySelector('.audio-progress-fill');
    if(fill&&audio.duration) fill.style.width=(audio.currentTime/audio.duration*100)+'%';
  });
  audio.addEventListener('ended',()=>{
    wrap.classList.remove('playing');
    setPlayIcon(wrap,false);
    const fill=wrap.querySelector('.audio-progress-fill');
    if(fill) fill.style.width='0%';
    activeAudio=null; activeWrap=null;
  });
  // seek on progress click
  const track=wrap.querySelector('.audio-progress-track');
  if(track){ track.onclick=(e)=>{ const r=track.getBoundingClientRect(); audio.currentTime=(e.clientX-r.left)/r.width*audio.duration; }; }
}
function setPlayIcon(wrap, playing){
  const svg=wrap.querySelector('.play-btn svg');
  if(!svg) return;
  svg.innerHTML = playing
    ? '<rect x="5" y="4" width="4" height="16"/><rect x="13" y="4" width="4" height="16"/>'
    : '<polygon points="6,4 18,12 6,20"/>';
}

// ── FLIP ──────────────────────────────────────────────────────────────
function flip(el){ el.classList.toggle('flipped'); }

// ── RIPPLE ────────────────────────────────────────────────────────────
function ripple(btn){
  const r=document.createElement('span');
  const s=Math.max(btn.offsetWidth,btn.offsetHeight)*2.5;
  r.className='ripple-el';
  r.style.cssText=`width:${s}px;height:${s}px;left:${btn.offsetWidth/2-s/2}px;top:${btn.offsetHeight/2-s/2}px;`;
  btn.appendChild(r);
  setTimeout(()=>r.remove(),700);
}

// ── REFLECTION SAVE ───────────────────────────────────────────────────
const rTimers={};
function saveRef(i,v){
  state.ref[i]=v;
  clearTimeout(rTimers[i]);
  rTimers[i]=setTimeout(()=>{
    save();
    const ind=document.getElementById('rsave-'+i);
    if(ind){ind.textContent='✓ Saved';ind.classList.add('ok');}
    setTimeout(()=>{ const ind=document.getElementById('rsave-'+i); if(ind){ind.textContent='';ind.classList.remove('ok');} },2000);
  },800);
}

// ── MARK COMPLETE ─────────────────────────────────────────────────────
function markDone(i,btn){
  ripple(btn);
  btn.disabled=true; btn.style.animation='none'; btn.textContent='✓ Day Completed';
  state.done.add(i);
  if(i===9){ save(); setTimeout(showCompletion,600); return; }
  state.cur=i+1; save();
  setTimeout(()=>{ renderGrid(); renderLesson(); document.getElementById('lesson-area').scrollIntoView({behavior:'smooth',block:'start'}); },500);
}

// ── RENDER GRID ───────────────────────────────────────────────────────
function renderGrid(){
  const ul=unlocked(), grid=document.getElementById('day-grid');
  grid.innerHTML='';
  DAYS.forEach((d,i)=>{
    const isDone=state.done.has(i), isLocked=i>=ul, isActive=i===state.cur;
    const btn=document.createElement('div');
    btn.className='day-btn'+(isDone?' done':'')+(isLocked?' locked':'')+(isActive?' active':'');
    btn.innerHTML=`<div class="day-num">DAY ${i+1}</div><div class="day-root">${d.root}</div>${isDone?'<div class="day-badge ck">✓</div>':''}${isLocked&&!isDone?'<div class="day-badge lk">🔒</div>':''}`;
    if(!isLocked) btn.addEventListener('click',()=>{ ripple(btn); state.cur=i; save(); renderGrid(); renderLesson(); document.getElementById('lesson-area').scrollIntoView({behavior:'smooth',block:'start'}); });
    grid.appendChild(btn);
  });
  const pct=state.done.size/10*100;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-label').textContent=`${state.done.size} / 10`;
  const pill=document.getElementById('prog-pill');
  pill.textContent=state.done.size===10?'✓ Complete!':`Day ${state.cur+1} of 10`;
}

// ── RENDER LESSON ─────────────────────────────────────────────────────
function renderLesson(){
  const area=document.getElementById('lesson-area'), i=state.cur, ul=unlocked(), d=DAYS[i], isDone=state.done.has(i);
  if(i>=ul){
    area.innerHTML=`<div class="lesson-card"><div class="locked-scr"><div class="locked-icon">🔒</div><div class="locked-title">Day ${i+1} is locked</div><div class="locked-sub">Complete Day ${i} first to unlock this lesson.<br>Each day builds on the one before it.</div></div></div>`;
    return;
  }
  const cards=d.roots.map(r=>`<div class="flip-card" onclick="flip(this)"><div class="flip-inner"><div class="flip-front"><div class="fa font-arabic">${r.arabic}</div><div class="fl">${r.l}</div><div class="fhint">Tap to reveal</div></div><div class="flip-back"><div class="fm">${r.m}</div><div class="ft">${r.t}</div><div class="fshift">${r.s}</div></div></div></div>`).join('');
  const prayers=d.prayers.map(p=>`<div class="prayer-row"><span class="ptag">${p.tag}</span><span class="ptext">${p.t}</span></div>`).join('');
  const hasAudio=!!d.audio;
  area.innerHTML=`
<div class="lesson-card">
  ${isDone?`<div class="done-banner" style="margin:14px 14px -2px"><span class="done-icon">✓</span><span class="done-txt">Day ${i+1} completed — revisit anytime.</span></div>`:''}
  <div class="lhdr">
    <div class="lhdr-badge">Day ${i+1} · Root: ${d.root}</div>
    <div class="lhdr-title">${d.title}</div>
    <div class="lhdr-mission">${d.mission}</div>
    <div class="lhdr-arabic font-arabic">${d.arabic}</div>
  </div>
  <div class="lbody">
    <div class="sec">🎧 Pronunciation Audio</div>
    <div class="audio-wrap${hasAudio?' has-audio':''}" id="aw-${i}" onclick="toggleAudio(${i},'${d.audio||''}')">
      <button class="play-btn" aria-label="${hasAudio?'Play audio':'No audio yet'}">
        <svg viewBox="0 0 24 24"><polygon points="6,4 18,12 6,20"/></svg>
      </button>
      <div class="audio-info">
        <div class="audio-title">${d.audioLabel}</div>
        <div class="audio-sub">${hasAudio?'Click to play':'Click to play'}</div>
        <div class="audio-progress-track"><div class="audio-progress-fill"></div></div>
      </div>
      <div class="wave-wrap">${Array(7).fill('<div class="wbar"></div>').join('')}</div>
    </div>

    <div class="sec">📖 Root Words — Tap each card to reveal meaning</div>
    <div class="flip-grid">${cards}</div>

    <div class="sec">💡 The Concept</div>
    <div class="concept"><p>${d.concept}</p></div>

    <div class="sec">⚡ Instant Decoding Win</div>
    <div class="decode">
      <div class="decode-label">Hear this in your next prayer:</div>
      <span class="decode-arabic font-arabic">${d.pA}</span>
      <div class="decode-trans">${d.pT}</div>
      <p>${d.decode}</p>
    </div>

    <div class="sec">🕌 Where You Hear It in Prayer</div>
    <div class="prayer-rows">${prayers}</div>

    <div class="sec">🎯 Today's Practice</div>
    <div class="practice"><div class="picon">▶</div><p>${d.practice}</p></div>

    <div class="sec">✍️ Reflection</div>
    <div class="reflection">
      <div class="rq">"${d.reflection}"</div>
      <textarea class="rinput" id="ri-${i}" placeholder="Write your thoughts — saved automatically..." rows="4" oninput="saveRef(${i},this.value)">${state.ref[i]||''}</textarea>
      <div class="rsave" id="rsave-${i}"></div>
    </div>

    <div class="action-row">
      <button class="cbtn" id="cbtn-${i}" onclick="markDone(${i},this)" ${isDone?'disabled':''}>
        ${isDone?'✓ Day Completed':i===9?'✓ Complete the Blueprint →':`Unlock Day ${i+2} →`}
      </button>
    </div>
  </div>
</div>`;
}

// ── COMPLETION ────────────────────────────────────────────────────────
function showCompletion(){
  const pills=DAYS.map((d,i)=>`<div class="comp-root" style="animation:checkBounce 0.3s ease ${i*0.05}s both"><div class="cr-day">DAY ${i+1}</div><div class="cr-root">${d.root}</div></div>`).join('');
  document.getElementById('lesson-area').innerHTML=`
<div class="completion">
  <div class="comp-hdr">
    <span class="comp-ameen font-arabic">آمين</span>
    <div class="comp-title">You have completed the 10-Day Fahm Blueprint.</div>
    <div class="comp-sub">These 10 roots will stay with you for life.<br>Every Salah you pray from now, these words will surface — not as sounds, but as meaning.</div>
  </div>
  <div class="comp-body">
    <div class="comp-verse">
      <div class="comp-arabic font-arabic">الَّذِينَ يَذْكُرُونَ اللَّهَ قِيَامًا وَقُعُودًا وَعَلَىٰ جُنُوبِهِمْ</div>
      <div class="comp-trans">"Those who remember Allah while standing, sitting, and on their sides." — Surah Aal Imran, 3:191</div>
    </div>
    <div style="font-size:10px;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-light);margin-bottom:12px;">Your 10 Roots</div>
    <div class="comp-roots">${pills}</div>
    <div class="comp-msg">May Allah accept your prayers and grant you understanding.<br><br><strong style="color:var(--em-dark);font-size:20px;font-family:'Amiri',serif;">Ameen.</strong></div>
  </div>
</div>`;
  document.getElementById('prog-fill').style.width='100%';
  document.getElementById('prog-pill').textContent='✓ Complete!';
}

// ── BOOT ──────────────────────────────────────────────────────────────
function initCourse(){
  load();
  if(state.cur>=unlocked()) state.cur=unlocked()-1;
  renderGrid(); renderLesson();
}
window.addEventListener('DOMContentLoaded',()=>{
  if(localStorage.getItem('fahm_auth')==='true'){
    document.getElementById('gate').style.display='none';
    document.getElementById('course').style.display='block';
    initCourse();
  }
});
</script>
</body>
</html>
